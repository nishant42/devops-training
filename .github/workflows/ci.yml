name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop,main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name:  Install dependencies
        run: npm ci 
      - name: Run lint 
        run: npm run lint